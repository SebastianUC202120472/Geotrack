# =============================================================================
# docker-compose de la RAÍZ del monorepo GeoTrack.
# Levanta todo el stack con:   docker compose up --build
#
#   db        -> PostgreSQL con volumen persistente + healthcheck
#   backend   -> FastAPI (REUTILIZA su Dockerfile existente; NO se reescribe)
#   frontend  -> React/Vite servido por Nginx, que ademas hace de reverse proxy
#
# Todas las variables sensibles vienen del .env (ver .env.example).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Base de datos
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Espera a que Postgres acepte conexiones antes de arrancar el backend.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend (FastAPI) — YA viene dockerizado: usamos SU Dockerfile tal cual.
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend            # <- reutiliza backend/Dockerfile existente (no se toca)
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Bandeja de correos (opcional). Si no se configuran, la bandeja queda en
      # modo "no configurado" y el resto del backend funciona igual.
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_ADDRESS: ${MAIL_ADDRESS:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      IMAP_HOST: ${IMAP_HOST:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      MAIL_FOLDER: ${MAIL_FOLDER:-INBOX}
    volumes:
      # Persiste las evidencias POD / archivos subidos (el backend los sirve en /media).
      - backend_uploads:/app/uploads
    ports:
      # Publicado para poder abrir Swagger directamente en http://localhost:8000/docs.
      # El navegador de la app NO usa este puerto: pasa por Nginx (frontend).
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend (Nginx sirviendo la SPA + reverse proxy hacia el backend)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        # Rutas RELATIVAS: el bundle pega contra el mismo origen y Nginx hace el
        # proxy a "backend". Asi no hay CORS ni localhost hardcodeado.
        VITE_API_URL: /api
        VITE_WS_URL: /
        VITE_GOOGLE_MAPS_KEY: ${VITE_GOOGLE_MAPS_KEY}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
