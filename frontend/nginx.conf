# =============================================================================
# Nginx del FRONTEND: sirve la SPA y hace de reverse proxy hacia el backend.
#
# El navegador SOLO habla con Nginx (puerto 80 -> publicado como 8080). Nginx
# reenvía /api, /media y /socket.io al servicio "backend" por la RED INTERNA de
# Docker (nombre DNS "backend"). Ventajas:
#   - No hay problemas de CORS (todo es el mismo origen para el navegador).
#   - El backend NO queda expuesto directo al navegador.
#   - No se hardcodea localhost en el bundle de Vite.
# =============================================================================

server {
    listen 80;
    server_name _;

    # Raíz de los archivos estáticos generados por `vite build`.
    root   /usr/share/nginx/html;
    index  index.html;

    # ---- SPA: fallback a index.html para que react-router maneje las rutas ----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- API REST del backend (los routers viven bajo /api/...) ----
    # proxy_pass SIN URI final => conserva el prefijo /api tal cual.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Archivos estáticos servidos por el backend (fotos POD / evidencias) ----
    location /media/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================================
    # ⚠️  AVISO IMPORTANTE — WebSocket / socket.io
    # -------------------------------------------------------------------------
    # src/pages/Flota.jsx abre una conexión socket.io contra VITE_WS_URL ("/"),
    # que cae en esta ruta /socket.io/. El proxy con upgrade a WebSocket YA
    # ESTÁ LISTO aquí abajo.
    #
    # PERO: el BACKEND TODAVÍA NO IMPLEMENTA un servidor de socket.io. Hasta que
    # se implemente, esta conexión FALLARÁ SILENCIOSAMENTE (el cliente intentará
    # reconectar y obtendrá 502/404 desde Nginx). Esto es ESPERADO por ahora.
    #
    # NO es un bug de esta configuración: cuando el backend exponga socket.io en
    # el puerto 8000, este proxy empezará a funcionar sin tocar nada más.
    # =========================================================================
    location /socket.io/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
